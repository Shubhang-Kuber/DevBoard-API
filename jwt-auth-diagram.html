<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DevBoard JWT Authentication</title>
  <style>
    body {
      margin: 0;
      background: #f5f0e8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 20px 60px;
    }
    svg { max-width: 1000px; width: 100%; }
  </style>
</head>
<body>
<svg viewBox="0 0 1000 1160" xmlns="http://www.w3.org/2000/svg" style="background:#f5f0e8;">

  <defs>
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- arrowheads -->
    <marker id="ah-black" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#222"/>
    </marker>
    <marker id="ah-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#1a5fa8"/>
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#2a7a3b"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════════════════
       TITLE
  ══════════════════════════════════════════════════ -->
  <text x="500" y="52" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="30" font-weight="bold" fill="#1a1a1a"
        filter="url(#wobble)">DevBoard JWT Authentication</text>
  <line x1="120" y1="64" x2="880" y2="64"
        stroke="#1a1a1a" stroke-width="1.6" stroke-dasharray="7,4" opacity="0.45"/>

  <!-- ══════════════════════════════════════════════════
       LEGEND  (top-right)
  ══════════════════════════════════════════════════ -->
  <rect x="720" y="76" width="252" height="82" rx="6"
        fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="846" y="94" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="11" fill="#666">— legend —</text>
  <line x1="734" y1="108" x2="762" y2="108" stroke="#222" stroke-width="2.2" marker-end="url(#ah-black)"/>
  <text x="768" y="112" font-family="'Segoe Print','Comic Sans MS',cursive" font-size="11" fill="#222">Login flow</text>
  <line x1="734" y1="126" x2="762" y2="126" stroke="#1a5fa8" stroke-width="2.2" marker-end="url(#ah-blue)"/>
  <text x="768" y="130" font-family="'Segoe Print','Comic Sans MS',cursive" font-size="11" fill="#1a5fa8">Protected route flow</text>
  <line x1="734" y1="144" x2="762" y2="144" stroke="#2a7a3b" stroke-width="2.2" marker-end="url(#ah-green)"/>
  <text x="768" y="148" font-family="'Segoe Print','Comic Sans MS',cursive" font-size="11" fill="#2a7a3b">Response to client</text>

  <!-- ══════════════════════════════════════════════════
       SECTION LABEL — LOGIN FLOW
  ══════════════════════════════════════════════════ -->
  <text x="16" y="92" font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="11" fill="#999" font-style="italic">① LOGIN FLOW</text>

  <!-- ──────────────────────────────────────────────────
       ROW 1 COMPONENTS
       CLIENT(30)  EXPRESS(230)  SQLite(560 center)
  ────────────────────────────────────────────────── -->

  <!-- CLIENT box -->
  <rect x="24" y="108" width="148" height="66" rx="6"
        fill="#fffde7" stroke="#222" stroke-width="2.2" filter="url(#wobble)"/>
  <text x="98" y="135" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="15" font-weight="bold" fill="#1a1a1a">CLIENT</text>
  <text x="98" y="153" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#555">(Browser / HTTP client)</text>

  <!-- EXPRESS SERVER box -->
  <rect x="248" y="108" width="174" height="66" rx="6"
        fill="#e8f5e9" stroke="#222" stroke-width="2.2" filter="url(#wobble)"/>
  <text x="335" y="134" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="14" font-weight="bold" fill="#1a1a1a">EXPRESS SERVER</text>
  <text x="335" y="152" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#555">authController.js</text>
  <text x="335" y="165" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="9" fill="#777">POST /api/auth/login</text>

  <!-- SQLite DB (cylinder) — right side, y-center ~148 -->
  <!-- top ellipse -->
  <ellipse cx="580" cy="122" rx="72" ry="17"
           fill="#fff8e1" stroke="#222" stroke-width="2" filter="url(#wobble)"/>
  <!-- body -->
  <rect x="508" y="122" width="144" height="56" fill="#fff8e1"/>
  <line x1="508" y1="122" x2="508" y2="178" stroke="#222" stroke-width="2"/>
  <line x1="652" y1="122" x2="652" y2="178" stroke="#222" stroke-width="2"/>
  <!-- bottom ellipse -->
  <ellipse cx="580" cy="178" rx="72" ry="17"
           fill="#fff8e1" stroke="#222" stroke-width="2" filter="url(#wobble)"/>
  <text x="580" y="149" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="13" font-weight="bold" fill="#1a1a1a">SQLite DB</text>
  <text x="580" y="166" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#555">users table</text>

  <!-- ──────────────────────────────────────────────────
       ROW 2 PROCESS BADGES (below the boxes)
       bcrypt(560)   jwt.sign(248)
  ────────────────────────────────────────────────── -->

  <!-- bcrypt badge — below SQLite -->
  <rect x="516" y="224" width="130" height="44" rx="20"
        fill="#fff3e0" stroke="#e65100" stroke-width="2" filter="url(#wobble)"/>
  <text x="581" y="243" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="#e65100">bcrypt</text>
  <text x="581" y="259" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#e65100">.compare(plain, hash)</text>

  <!-- jwt.sign badge — below Express -->
  <rect x="248" y="224" width="130" height="44" rx="20"
        fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" filter="url(#wobble)"/>
  <text x="313" y="243" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="#6a1b9a">jwt.sign()</text>
  <text x="313" y="259" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#6a1b9a">payload + SECRET_KEY</text>

  <!-- ──────────────────────────────────────────────────
       LOGIN FLOW ARROWS  (black)
  ────────────────────────────────────────────────── -->

  <!-- STEP 1 → Client → Express (POST /login) -->
  <path d="M 174 136 C 200 126, 220 126, 246 136"
        stroke="#222" stroke-width="2.2" fill="none" marker-end="url(#ah-black)"/>
  <!-- step badge -->
  <circle cx="210" cy="114" r="12" fill="#222"/>
  <text x="210" y="119" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="white">1</text>
  <!-- label -->
  <text x="210" y="104" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#222">POST /login</text>
  <text x="210" y="93" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="9" fill="#555">{ email, password }</text>

  <!-- STEP 2 → Express → SQLite (SELECT user) -->
  <path d="M 424 141 C 460 135, 490 130, 506 131"
        stroke="#222" stroke-width="2.2" fill="none" marker-end="url(#ah-black)"/>
  <circle cx="464" cy="116" r="12" fill="#222"/>
  <text x="464" y="121" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="white">2</text>
  <text x="464" y="106" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#222">SELECT user</text>
  <text x="464" y="95" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="9" fill="#555">WHERE email = ?</text>

  <!-- STEP 3 → SQLite → bcrypt (return hash) -->
  <path d="M 580 196 C 580 208, 580 216, 580 222"
        stroke="#222" stroke-width="2.2" fill="none" marker-end="url(#ah-black)"/>
  <circle cx="600" cy="210" r="12" fill="#222"/>
  <text x="600" y="215" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="white">3</text>
  <text x="644" y="207" font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#222">row returned</text>
  <text x="644" y="219" font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="9" fill="#555">passwordHash field</text>

  <!-- STEP 4 → bcrypt → jwt.sign (✓ match) -->
  <path d="M 514 246 C 476 246, 430 246, 380 246"
        stroke="#222" stroke-width="2.2" fill="none" marker-end="url(#ah-black)"/>
  <circle cx="447" cy="234" r="12" fill="#222"/>
  <text x="447" y="239" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="white">4</text>
  <text x="447" y="224" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#222">✓ passwords match</text>

  <!-- STEP 5 → jwt.sign → Client (token back) -->
  <path d="M 248 254 C 200 270, 150 270, 105 178"
        stroke="#2a7a3b" stroke-width="2.2" fill="none" marker-end="url(#ah-green)"/>
  <circle cx="166" cy="272" r="12" fill="#2a7a3b"/>
  <text x="166" y="277" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="white">5</text>
  <text x="100" y="286" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#2a7a3b">200 OK</text>
  <text x="100" y="298" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="9" fill="#2a7a3b">{ token: "eyJ..." }</text>
  <text x="100" y="310" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="9" fill="#777">client stores in localStorage</text>

  <!-- ══════════════════════════════════════════════════
       DIVIDER between login and protected-route sections
  ══════════════════════════════════════════════════ -->
  <line x1="24" y1="334" x2="976" y2="334"
        stroke="#bbb" stroke-width="1.4" stroke-dasharray="10,6"/>
  <text x="500" y="330" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="11" fill="#aaa">─ ─ ─  time passes  ─ ─ ─</text>

  <!-- ══════════════════════════════════════════════════
       SECTION LABEL — PROTECTED ROUTE FLOW
  ══════════════════════════════════════════════════ -->
  <text x="16" y="356" font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="11" fill="#1a5fa8" font-style="italic">② PROTECTED ROUTE FLOW</text>

  <!-- ──────────────────────────────────────────────────
       ROW 3 COMPONENTS
       CLIENT(30)  AUTH MIDDLEWARE(300)  CONTROLLER(680)
  ────────────────────────────────────────────────── -->

  <!-- CLIENT (later request) — dashed border -->
  <rect x="24" y="368" width="148" height="66" rx="6"
        fill="#fffde7" stroke="#1a5fa8" stroke-width="2"
        stroke-dasharray="6,3" filter="url(#wobble)"/>
  <text x="98" y="395" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="15" font-weight="bold" fill="#1a1a1a">CLIENT</text>
  <text x="98" y="413" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#1a5fa8">(later request)</text>

  <!-- AUTH MIDDLEWARE box -->
  <rect x="300" y="368" width="182" height="66" rx="6"
        fill="#e3f2fd" stroke="#1a5fa8" stroke-width="2.2" filter="url(#wobble)"/>
  <text x="391" y="394" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="14" font-weight="bold" fill="#1a1a1a">AUTH MIDDLEWARE</text>
  <text x="391" y="412" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#555">verifyToken(req, res, next)</text>

  <!-- jwt.verify badge — directly below Auth Middleware -->
  <rect x="316" y="462" width="150" height="44" rx="20"
        fill="#e8eaf6" stroke="#283593" stroke-width="2" filter="url(#wobble)"/>
  <text x="391" y="481" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="#283593">jwt.verify()</text>
  <text x="391" y="497" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#283593">token + SECRET_KEY</text>

  <!-- CONTROLLER box -->
  <rect x="682" y="368" width="170" height="66" rx="6"
        fill="#fce4ec" stroke="#222" stroke-width="2.2" filter="url(#wobble)"/>
  <text x="767" y="394" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="14" font-weight="bold" fill="#1a1a1a">CONTROLLER</text>
  <text x="767" y="412" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#555">tasksController.js</text>

  <!-- ──────────────────────────────────────────────────
       PROTECTED ROUTE ARROWS  (blue)
  ────────────────────────────────────────────────── -->

  <!-- STEP 6 → Client → Auth Middleware (GET /tasks + token) -->
  <path d="M 174 394 C 220 384, 260 384, 298 394"
        stroke="#1a5fa8" stroke-width="2.2" fill="none" marker-end="url(#ah-blue)"/>
  <circle cx="236" cy="370" r="12" fill="#1a5fa8"/>
  <text x="236" y="375" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="white">6</text>
  <text x="236" y="360" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#1a5fa8">GET /api/tasks</text>
  <text x="236" y="349" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="9" fill="#555">Authorization: Bearer eyJ...</text>

  <!-- STEP 7 → Auth Middleware → jwt.verify (verify token) -->
  <path d="M 391 436 C 391 448, 391 454, 391 460"
        stroke="#1a5fa8" stroke-width="2.2" fill="none" marker-end="url(#ah-blue)"/>
  <circle cx="414" cy="450" r="12" fill="#1a5fa8"/>
  <text x="414" y="455" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="white">7</text>
  <text x="466" y="446" font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#1a5fa8">verify signature</text>
  <text x="466" y="458" font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="9" fill="#555">→ req.user = decoded payload</text>

  <!-- STEP 8 → jwt.verify → Controller (next()) -->
  <!-- arrow goes right from jwt.verify badge, then up to controller -->
  <path d="M 466 484 C 580 484, 640 460, 680 401"
        stroke="#1a5fa8" stroke-width="2.2" fill="none" marker-end="url(#ah-blue)"/>
  <circle cx="580" cy="470" r="12" fill="#1a5fa8"/>
  <text x="580" y="475" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="white">8</text>
  <text x="580" y="460" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#1a5fa8">next()  →  controller runs</text>

  <!-- Response: Controller → Client (long green dashed arc) -->
  <path d="M 767 436 C 767 530, 400 540, 98 436"
        stroke="#2a7a3b" stroke-width="2.2" fill="none"
        stroke-dasharray="8,4" marker-end="url(#ah-green)"/>
  <text x="430" y="556" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="11" fill="#2a7a3b">200 OK  { tasks: [ {...}, {...} ] }</text>

  <!-- ══════════════════════════════════════════════════
       SEPARATOR before anatomy section
  ══════════════════════════════════════════════════ -->
  <line x1="24" y1="584" x2="976" y2="584"
        stroke="#bbb" stroke-width="1.4" stroke-dasharray="8,5"/>
  <text x="500" y="580" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="11" fill="#999">— JWT Token Anatomy —</text>

  <!-- ══════════════════════════════════════════════════
       JWT TOKEN ANATOMY
  ══════════════════════════════════════════════════ -->
  <text x="500" y="616" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="18" font-weight="bold" fill="#1a1a1a">
    JWT  =  Header  ·  Payload  ·  Signature
  </text>

  <!-- ── HEADER block ── -->
  <rect x="34" y="634" width="248" height="116" rx="7"
        fill="#fff3e0" stroke="#e65100" stroke-width="2.2" filter="url(#wobble)"/>
  <rect x="34" y="634" width="248" height="30" rx="7" fill="#e65100"/>
  <!-- cover bottom corners of header bar -->
  <rect x="34" y="652" width="248" height="12" fill="#e65100"/>
  <text x="158" y="655" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="14" font-weight="bold" fill="white">HEADER</text>
  <text x="158" y="683" text-anchor="middle" font-family="monospace" font-size="12" fill="#bf360c">{</text>
  <text x="158" y="698" text-anchor="middle" font-family="monospace" font-size="11" fill="#bf360c">  "alg": "HS256",</text>
  <text x="158" y="713" text-anchor="middle" font-family="monospace" font-size="11" fill="#bf360c">  "typ": "JWT"</text>
  <text x="158" y="728" text-anchor="middle" font-family="monospace" font-size="12" fill="#bf360c">}</text>
  <text x="158" y="746" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#e65100">Base64Url encoded</text>

  <!-- ── PAYLOAD block ── -->
  <rect x="376" y="634" width="248" height="116" rx="7"
        fill="#e8f5e9" stroke="#2a7a3b" stroke-width="2.2" filter="url(#wobble)"/>
  <rect x="376" y="634" width="248" height="30" rx="7" fill="#2a7a3b"/>
  <rect x="376" y="652" width="248" height="12" fill="#2a7a3b"/>
  <text x="500" y="655" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="14" font-weight="bold" fill="white">PAYLOAD  (claims)</text>
  <text x="500" y="683" text-anchor="middle" font-family="monospace" font-size="11" fill="#1b5e20">{  "id": 42,  "role": "user",</text>
  <text x="500" y="698" text-anchor="middle" font-family="monospace" font-size="11" fill="#1b5e20">  "iat": 1718000000,</text>
  <text x="500" y="713" text-anchor="middle" font-family="monospace" font-size="11" fill="#1b5e20">  "exp": 1718086400  }</text>
  <text x="500" y="733" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="9" fill="#c62828">⚠  Base64Url encoded — NOT encrypted!</text>
  <text x="500" y="746" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="9" fill="#888">Anyone can decode — never store secrets here</text>

  <!-- ── SIGNATURE block ── -->
  <rect x="718" y="634" width="248" height="116" rx="7"
        fill="#e3f2fd" stroke="#1a5fa8" stroke-width="2.2" filter="url(#wobble)"/>
  <rect x="718" y="634" width="248" height="30" rx="7" fill="#1a5fa8"/>
  <rect x="718" y="652" width="248" height="12" fill="#1a5fa8"/>
  <text x="842" y="655" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="14" font-weight="bold" fill="white">SIGNATURE</text>
  <text x="842" y="681" text-anchor="middle" font-family="monospace" font-size="11" fill="#0d47a1">HMACSHA256(</text>
  <text x="842" y="696" text-anchor="middle" font-family="monospace" font-size="11" fill="#0d47a1">  base64url(header) +</text>
  <text x="842" y="711" text-anchor="middle" font-family="monospace" font-size="11" fill="#0d47a1">  "." + base64url(payload),</text>
  <text x="842" y="726" text-anchor="middle" font-family="monospace" font-size="11" fill="#0d47a1">  SECRET_KEY  )</text>
  <text x="842" y="746" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="10" fill="#1a5fa8">Tamper-proof seal</text>

  <!-- dots between blocks -->
  <text x="362" y="700" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="30" font-weight="bold" fill="#c0392b">.</text>
  <text x="704" y="700" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive"
        font-size="30" font-weight="bold" fill="#c0392b">.</text>

  <!-- ── Token example strip ── -->
  <rect x="34" y="762" width="932" height="38" rx="5"
        fill="#1a1a1a" stroke="#555" stroke-width="1.4"/>
  <!-- header portion -->
  <text x="160" y="785" text-anchor="middle"
        font-family="monospace" font-size="11" fill="#e65100">eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9</text>
  <text x="326" y="787" text-anchor="middle"
        font-family="monospace" font-size="16" font-weight="bold" fill="#c0392b">.</text>
